<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meal Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #EDEAE2; }
  button:focus-visible, input:focus-visible, textarea:focus-visible { outline: 2px solid #3F5A3E; outline-offset: 2px; }
  textarea, input, button { font-family: 'Inter', sans-serif; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const COLORS = {
  bg: "#EDEAE2", card: "#FFFFFF", ink: "#2B2823", inkSoft: "#847C6E",
  line: "#DDD7C8", avocado: "#3F5A3E", avocadoSoft: "#DCE5DA",
  mango: "#D98A2B", mangoSoft: "#F3E2C8", tomato: "#B23A2A", tomatoSoft: "#F2DAD5",
};

function todayKey(d = new Date()) { return d.toISOString().slice(0, 10); }
function niceDate(d = new Date()) { return d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" }); }

function loadJSON(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch (e) { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch (e) { console.error("Could not save", key, e); }
}

function resizeImage(file, maxDim = 640, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Could not read the photo"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Could not load the photo"));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round((height * maxDim) / width); width = maxDim; }
        else if (height > maxDim) { width = Math.round((width * maxDim) / height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function estimateNutrition({ apiKey, imageBase64, notesText, descriptionText }) {
  if (!apiKey) throw new Error("NO_KEY");
  let content;
  if (imageBase64) {
    let promptText = "Look at this meal photo and estimate its nutrition.";
    if (notesText && notesText.trim()) {
      promptText += ` The user has also noted these specific ingredients or details to make the estimate more accurate: "${notesText.trim()}". Weigh these notes alongside what you see in the photo — they take priority over guesswork.`;
    }
    promptText += ' Respond with ONLY raw JSON, no markdown fences, no preamble, in exactly this shape: {"meal_name": "short name", "items": ["item 1", "item 2"], "calories": number, "protein_g": number, "confidence": "low|medium|high", "note": "one short sentence caveat about the estimate"}. Estimate for the full visible portion shown.';
    content = [
      { type: "image", source: { type: "base64", media_type: "image/jpeg", data: imageBase64 } },
      { type: "text", text: promptText },
    ];
  } else {
    const promptText = `Estimate the nutrition for a meal made of these ingredients (use any quantities given, otherwise assume a typical single serving amount):\n${descriptionText}\n\nRespond with ONLY raw JSON, no markdown fences, no preamble, in exactly this shape: {"meal_name": "short name", "items": ["item 1", "item 2"], "calories": number, "protein_g": number, "confidence": "low|medium|high", "note": "one short sentence caveat about the estimate"}.`;
    content = [{ type: "text", text: promptText }];
  }

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-5",
      max_tokens: 1000,
      messages: [{ role: "user", content }],
    }),
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message || "API error");
  const text = (data.content || []).map((b) => b.text || "").join("").trim();
  const clean = text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

function useSpeechToText(onResult) {
  const recognitionRef = useRef(null);
  const stopRequestedRef = useRef(false);
  const [listening, setListening] = useState(false);
  const SR = typeof window !== "undefined" ? (window.SpeechRecognition || window.webkitSpeechRecognition) : null;
  const supported = !!SR;

  function createRecognition() {
    const recognition = new SR();
    recognition.lang = "en-US";
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          onResult(e.results[i][0].transcript);
        }
      }
    };
    recognition.onend = () => {
      // Some browsers end the session on their own after a pause even in
      // continuous mode. If the person hasn't tapped stop, pick it back up.
      if (!stopRequestedRef.current) {
        try { recognition.start(); return; } catch (e) {}
      }
      setListening(false);
    };
    recognition.onerror = (e) => {
      if (e.error === "no-speech" || e.error === "audio-capture" || e.error === "network") return;
      stopRequestedRef.current = true;
      setListening(false);
    };
    return recognition;
  }

  function start() {
    if (!supported || listening) return;
    stopRequestedRef.current = false;
    const recognition = createRecognition();
    recognitionRef.current = recognition;
    try { recognition.start(); setListening(true); } catch (e) { setListening(false); }
  }
  function stop() {
    stopRequestedRef.current = true;
    recognitionRef.current?.stop();
    setListening(false);
  }
  return { start, stop, listening, supported };
}

function VoiceButton({ voice, label = "Record" }) {
  if (!voice.supported) return null;
  return (
    <button
      type="button"
      onClick={voice.listening ? voice.stop : voice.start}
      style={{
        display: "flex", alignItems: "center", gap: 6,
        background: voice.listening ? COLORS.tomato : "#fff",
        color: voice.listening ? "#fff" : COLORS.ink,
        border: `1px solid ${voice.listening ? COLORS.tomato : COLORS.line}`,
        borderRadius: 999, padding: "7px 13px", fontSize: 12.5, fontWeight: 600, cursor: "pointer", flexShrink: 0,
      }}
    >
      <span style={{ fontSize: 13, animation: voice.listening ? "pulse 1s ease-in-out infinite" : "none" }}>🎙️</span>
      {voice.listening ? "Listening… tap to stop" : label}
    </button>
  );
}

function PlateRing({ value, goal, label, color, softColor, unit }) {
  const size = 168, stroke = 13, r = (size - stroke) / 2;
  const circumference = 2 * Math.PI * r;
  const pct = goal > 0 ? Math.min(value / goal, 1) : 0;
  const offset = circumference * (1 - pct);
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10 }}>
      <div style={{ position: "relative", width: size, height: size }}>
        <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
          <circle cx={size/2} cy={size/2} r={r + stroke/2 + 4} fill="none" stroke={COLORS.line} strokeWidth={1.5} />
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={softColor} strokeWidth={stroke} />
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round"
            style={{ transition: "stroke-dashoffset 0.6s ease" }} />
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 30, fontWeight: 600, color: COLORS.ink, lineHeight: 1 }}>{Math.round(value)}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: COLORS.inkSoft, marginTop: 4 }}>/ {goal}{unit}</span>
        </div>
      </div>
      <span style={{ fontFamily: "'Fraunces', serif", fontSize: 16, color: COLORS.ink }}>{label}</span>
    </div>
  );
}

function ConfidenceBadge({ confidence }) {
  const map = {
    high: { bg: COLORS.avocadoSoft, fg: COLORS.avocado, text: "High confidence" },
    medium: { bg: COLORS.mangoSoft, fg: COLORS.mango, text: "Medium confidence" },
    low: { bg: COLORS.tomatoSoft, fg: COLORS.tomato, text: "Low confidence" },
    manual: { bg: "#EAE7DF", fg: COLORS.inkSoft, text: "Manual entry" },
  };
  const c = map[confidence] || map.medium;
  return <span style={{ background: c.bg, color: c.fg, fontSize: 11.5, fontWeight: 600, padding: "3px 9px", borderRadius: 999, whiteSpace: "nowrap" }}>{c.text}</span>;
}

function Thumb({ thumbnail, name, size = 56 }) {
  if (thumbnail) {
    return <div style={{ width: size, height: size, borderRadius: "50%", overflow: "hidden", flexShrink: 0, border: `2px solid ${COLORS.line}` }}>
      <img src={thumbnail} alt={name} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
    </div>;
  }
  return <div style={{ width: size, height: size, borderRadius: "50%", flexShrink: 0, border: `2px solid ${COLORS.line}`, background: COLORS.mangoSoft, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.42 }}>🍽️</div>;
}

function MealRow({ m, onEdit, onDelete }) {
  return (
    <div style={{ display: "flex", gap: 12, background: COLORS.card, border: `1px solid ${COLORS.line}`, borderRadius: 16, padding: 12, alignItems: "center" }}>
      <Thumb thumbnail={m.thumbnail} name={m.name} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
          <span style={{ fontFamily: "'Fraunces', serif", fontSize: 15.5, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{m.name}</span>
          <span style={{ color: COLORS.inkSoft, fontSize: 12, flexShrink: 0 }}>{m.time}</span>
        </div>
        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, marginTop: 4 }}>
          <span style={{ color: COLORS.avocado, fontWeight: 600 }}>{m.calories}</span> cal · <span style={{ color: COLORS.mango, fontWeight: 600 }}>{m.protein}g</span> protein
        </div>
        {m.items && m.items.length > 0 && <div style={{ color: COLORS.inkSoft, fontSize: 11.5, marginTop: 3 }}>{m.items.join(", ")}</div>}
        {m.note && <div style={{ color: COLORS.inkSoft, fontSize: 12, marginTop: 3 }}>{m.note}</div>}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 4, flexShrink: 0 }}>
        <button onClick={onEdit} aria-label={`Edit ${m.name}`} style={{ background: "none", border: "none", cursor: "pointer", padding: 6 }}><span style={{ fontSize: 15 }}>✏️</span></button>
        <button onClick={onDelete} aria-label={`Remove ${m.name}`} style={{ background: "none", border: "none", cursor: "pointer", padding: 6 }}><span style={{ fontSize: 15 }}>🗑️</span></button>
      </div>
    </div>
  );
}

function SimpleBarChart({ data, dataKey, goal, color }) {
  const w = 340, h = 130, padTop = 10, padBottom = 22, gap = 8;
  const barW = (w - gap * (data.length + 1)) / data.length;
  const maxVal = Math.max(goal, ...data.map(d => d[dataKey]), 1) * 1.15;
  const scale = (h - padTop - padBottom) / maxVal;
  const goalY = h - padBottom - goal * scale;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display: "block" }}>
      <line x1={0} y1={goalY} x2={w} y2={goalY} stroke={COLORS.tomato} strokeWidth={1.5} strokeDasharray="4 4" />
      {data.map((d, i) => {
        const val = d[dataKey];
        const barH = Math.max(val * scale, val > 0 ? 3 : 0);
        const x = gap + i * (barW + gap);
        const y = h - padBottom - barH;
        return (
          <g key={d.date}>
            <rect x={x} y={y} width={barW} height={barH} rx={5} fill={color} />
            <text x={x + barW / 2} y={h - 6} textAnchor="middle" fontSize="10.5" fill={COLORS.inkSoft} fontFamily="Inter, sans-serif">{d.label}</text>
          </g>
        );
      })}
    </svg>
  );
}

const inputStyle = { width: "100%", padding: "10px 12px", borderRadius: 10, border: `1px solid ${COLORS.line}`, fontSize: 14.5, color: COLORS.ink, background: "#fff" };
const labelStyle = { display: "block", fontSize: 13, color: COLORS.inkSoft, marginBottom: 6, marginTop: 14 };
const primaryBtn = { width: "100%", background: COLORS.avocado, color: "#fff", border: "none", borderRadius: 10, padding: "12px", fontWeight: 600, cursor: "pointer", fontSize: 14.5 };
const secondaryBtn = { width: "100%", background: "#fff", color: COLORS.ink, border: `1px solid ${COLORS.line}`, borderRadius: 10, padding: "12px", fontWeight: 600, cursor: "pointer", fontSize: 14.5 };
function segBtn(active) {
  return { flex: 1, padding: "9px 0", borderRadius: 999, border: "none", cursor: "pointer", fontSize: 12.5, fontWeight: 600, background: active ? COLORS.avocado : "transparent", color: active ? "#fff" : COLORS.inkSoft, transition: "background 0.2s ease" };
}

function ResultPreview({ preview, onSave, onDiscard }) {
  if (!preview) return null;
  return (
    <div style={{ marginTop: 16, background: COLORS.avocadoSoft, borderRadius: 14, padding: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
        <span style={{ fontFamily: "'Fraunces', serif", fontSize: 17, fontWeight: 600 }}>{preview.meal_name || preview.name}</span>
        <ConfidenceBadge confidence={preview.confidence} />
      </div>
      {(preview.items || []).length > 0 && <div style={{ color: COLORS.inkSoft, fontSize: 13, marginTop: 6 }}>{(preview.items || []).join(", ")}</div>}
      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 15, marginTop: 10 }}>
        <span style={{ color: COLORS.avocado, fontWeight: 700 }}>{Math.round(preview.calories ?? 0)}</span> cal · <span style={{ color: COLORS.mango, fontWeight: 700 }}>{Math.round(preview.protein_g ?? 0)}g</span> protein
      </div>
      {preview.note && <div style={{ color: COLORS.inkSoft, fontSize: 12.5, marginTop: 6 }}>{preview.note}</div>}
      <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
        <button onClick={onDiscard} style={{ ...secondaryBtn, flex: 1 }}>Redo</button>
        <button onClick={onSave} style={{ ...primaryBtn, flex: 1 }}>Save meal</button>
      </div>
    </div>
  );
}

function MealTracker() {
  const [view, setView] = useState("today"); // today | week | history
  const [meals, setMeals] = useState(() => loadJSON(`meals:${todayKey()}`, []));
  const [goals, setGoals] = useState(() => loadJSON("goals", { calories: 2000, protein: 90 }));
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("apiKey") || "");
  const [error, setError] = useState(null);

  const [showSettings, setShowSettings] = useState(false);
  const [draftGoals, setDraftGoals] = useState(goals);
  const [draftKey, setDraftKey] = useState(apiKey);

  const [showAdd, setShowAdd] = useState(false);
  const [addTab, setAddTab] = useState("photo");
  const [photoData, setPhotoData] = useState(null);
  const [notesText, setNotesText] = useState("");
  const [manualName, setManualName] = useState("");
  const [manualIngredients, setManualIngredients] = useState("");
  const [manualOverride, setManualOverride] = useState(false);
  const [manualCalories, setManualCalories] = useState("");
  const [manualProtein, setManualProtein] = useState("");
  const [estimating, setEstimating] = useState(false);
  const [preview, setPreview] = useState(null);

  const [editMeal, setEditMeal] = useState(null);
  const [editDayKey, setEditDayKey] = useState(null);
  const [refineNotes, setRefineNotes] = useState("");
  const [editCalories, setEditCalories] = useState("");
  const [editProtein, setEditProtein] = useState("");
  const [editBusy, setEditBusy] = useState(false);

  const [weekData, setWeekData] = useState([]);
  const [weekOffset, setWeekOffset] = useState(0); // 0 = last 7 days ending today, 1 = the 7 before that, etc.
  const [historyDays, setHistoryDays] = useState([]);

  const modalFileInputRef = useRef(null);
  const dateKey = todayKey();

  const photoVoice = useSpeechToText((text) => setNotesText((prev) => (prev ? prev + " " + text : text)));
  const manualVoice = useSpeechToText((text) => setManualIngredients((prev) => (prev ? prev + "\n" + text : text)));
  const editVoice = useSpeechToText((text) => setRefineNotes((prev) => (prev ? prev + " " + text : text)));

  useEffect(() => { if (view === "week") loadWeek(weekOffset); if (view === "history") loadHistory(); }, [view, weekOffset]);

  function saveMeals(next) { setMeals(next); saveJSON(`meals:${dateKey}`, next); }
  function saveGoals(next) { setGoals(next); saveJSON("goals", next); }
  function saveApiKey(key) { setApiKey(key); localStorage.setItem("apiKey", key); }

  function buildWeekDates(offset = 0) {
    const arr = [];
    for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i - offset * 7); arr.push(d); }
    return arr;
  }

  function loadWeek(offset = 0) {
    const dates = buildWeekDates(offset);
    const results = dates.map((d) => {
      const key = todayKey(d);
      const dayMeals = loadJSON(`meals:${key}`, []);
      const calories = dayMeals.reduce((s, m) => s + (m.calories || 0), 0);
      const protein = dayMeals.reduce((s, m) => s + (m.protein || 0), 0);
      return { date: key, label: d.toLocaleDateString(undefined, { weekday: "short" }), full: d.toLocaleDateString(undefined, { month: "short", day: "numeric" }), calories, protein, count: dayMeals.length, isToday: key === dateKey };
    });
    setWeekData(results);
  }

  function loadHistory() {
    const keys = Object.keys(localStorage).filter((k) => k.startsWith("meals:"));
    const days = keys
      .map((k) => {
        const date = k.replace("meals:", "");
        const dayMeals = loadJSON(k, []);
        return { date, meals: dayMeals };
      })
      .filter((d) => d.meals.length > 0)
      .sort((a, b) => b.date.localeCompare(a.date));
    setHistoryDays(days);
  }

  function resetAddModal() {
    setPhotoData(null); setNotesText(""); setManualName(""); setManualIngredients("");
    setManualOverride(false); setManualCalories(""); setManualProtein(""); setPreview(null); setError(null);
  }
  function openAdd() { resetAddModal(); setAddTab("photo"); setShowAdd(true); }
  function closeAdd() { setShowAdd(false); resetAddModal(); }

  async function handleModalPhotoSelect(e) {
    const file = e.target.files?.[0]; e.target.value = "";
    if (!file) return;
    setError(null);
    try {
      const dataUrl = await resizeImage(file);
      setPhotoData({ dataUrl, base64: dataUrl.split(",")[1] });
      setPreview(null);
    } catch (err) { setError("Couldn't read that photo. Try a different one."); }
  }

  async function estimateFromPhoto() {
    if (!photoData) return;
    if (!apiKey) { setError("Add your Anthropic API key in settings first — tap the gear icon."); return; }
    setEstimating(true); setError(null);
    try {
      const result = await estimateNutrition({ apiKey, imageBase64: photoData.base64, notesText });
      setPreview(result);
    } catch (err) {
      console.error(err);
      setError(err.message === "NO_KEY" ? "Add your Anthropic API key in settings first." : "Couldn't estimate that meal. Check your API key, or try again.");
    } finally { setEstimating(false); }
  }

  async function estimateFromManual() {
    if (!manualIngredients.trim()) { setError("Add at least one ingredient first."); return; }
    if (!apiKey) { setError("Add your Anthropic API key in settings first — tap the gear icon."); return; }
    setEstimating(true); setError(null);
    try {
      const description = `${manualName ? `Meal name: ${manualName}\n` : ""}Ingredients:\n${manualIngredients}`;
      const result = await estimateNutrition({ apiKey, descriptionText: description });
      setPreview(result);
    } catch (err) {
      console.error(err);
      setError(err.message === "NO_KEY" ? "Add your Anthropic API key in settings first." : "Couldn't estimate that meal. Check your API key, or try again.");
    } finally { setEstimating(false); }
  }

  function saveFromPreview() {
    const entry = {
      id: `${Date.now()}`,
      time: new Date().toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" }),
      thumbnail: photoData ? photoData.dataUrl : null,
      name: preview.meal_name || manualName || "Meal",
      items: preview.items || [],
      calories: Number(preview.calories) || 0,
      protein: Number(preview.protein_g) || 0,
      confidence: preview.confidence || "medium",
      note: preview.note || "",
    };
    saveMeals([entry, ...meals]);
    closeAdd();
  }

  function saveManualDirect() {
    if (!manualCalories && !manualProtein) { setError("Enter at least a calorie or protein value."); return; }
    const entry = {
      id: `${Date.now()}`,
      time: new Date().toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" }),
      thumbnail: null,
      name: manualName || "Meal",
      items: manualIngredients.split("\n").map((s) => s.trim()).filter(Boolean),
      calories: Number(manualCalories) || 0,
      protein: Number(manualProtein) || 0,
      confidence: "manual",
      note: "Entered manually",
    };
    saveMeals([entry, ...meals]);
    closeAdd();
  }

  function deleteMealFromDay(dayKey, mealId) {
    const dayMeals = loadJSON(`meals:${dayKey}`, []);
    const next = dayMeals.filter((m) => m.id !== mealId);
    saveJSON(`meals:${dayKey}`, next);
    if (dayKey === dateKey) setMeals(next);
    if (view === "history") loadHistory();
    if (view === "week") loadWeek();
  }

  function openEdit(meal, dayKey) {
    setEditMeal(meal); setEditDayKey(dayKey); setRefineNotes("");
    setEditCalories(String(meal.calories)); setEditProtein(String(meal.protein)); setError(null);
  }
  function closeEdit() { setEditMeal(null); setEditDayKey(null); setRefineNotes(""); setError(null); }

  async function recalcEdit() {
    if (!editMeal) return;
    if (!apiKey) { setError("Add your Anthropic API key in settings first."); return; }
    setEditBusy(true); setError(null);
    try {
      let result;
      if (editMeal.thumbnail) {
        const base64 = editMeal.thumbnail.split(",")[1];
        result = await estimateNutrition({ apiKey, imageBase64: base64, notesText: refineNotes });
      } else {
        const description = `${editMeal.name ? `Meal name: ${editMeal.name}\n` : ""}Ingredients:\n${(editMeal.items || []).join("\n")}\n${refineNotes}`;
        result = await estimateNutrition({ apiKey, descriptionText: description });
      }
      const updated = { ...editMeal, name: result.meal_name || editMeal.name, items: result.items || editMeal.items, calories: Number(result.calories) || editMeal.calories, protein: Number(result.protein_g) || editMeal.protein, confidence: result.confidence || "medium", note: result.note || "" };
      applyMealUpdate(updated);
      closeEdit();
    } catch (err) {
      console.error(err);
      setError("Couldn't recalculate that estimate. Check your API key, or try again.");
    } finally { setEditBusy(false); }
  }

  function saveEditNumbers() {
    const updated = { ...editMeal, calories: Number(editCalories) || 0, protein: Number(editProtein) || 0, confidence: "manual", note: "Edited manually" };
    applyMealUpdate(updated);
    closeEdit();
  }

  function applyMealUpdate(updated) {
    const dayKey = editDayKey || dateKey;
    const dayMeals = loadJSON(`meals:${dayKey}`, []);
    const next = dayMeals.map((m) => (m.id === updated.id ? updated : m));
    saveJSON(`meals:${dayKey}`, next);
    if (dayKey === dateKey) setMeals(next);
    if (view === "history") loadHistory();
    if (view === "week") loadWeek();
  }

  const totals = meals.reduce((acc, m) => ({ calories: acc.calories + m.calories, protein: acc.protein + m.protein }), { calories: 0, protein: 0 });

  return (
    <div style={{ background: COLORS.bg, minHeight: "100vh", fontFamily: "'Inter', sans-serif", color: COLORS.ink, paddingBottom: 100 }}>
      <div style={{ maxWidth: 460, margin: "0 auto", padding: "28px 20px 0" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontFamily: "'Fraunces', serif", fontSize: 26, fontWeight: 600 }}>
              {view === "today" ? "Today's plate" : view === "week" ? "This week" : "History"}
            </div>
            <div style={{ color: COLORS.inkSoft, fontSize: 14, marginTop: 2, display: "flex", alignItems: "center", gap: 10 }}>
              {view === "week" ? (
                <>
                  <button onClick={() => setWeekOffset((o) => o + 1)} aria-label="Previous week" style={{ background: "none", border: "none", cursor: "pointer", padding: 2, color: COLORS.ink, fontSize: 15 }}>‹</button>
                  <span>{weekData.length ? `${weekData[0].full} – ${weekData[6].full}` : ""}{weekOffset === 0 ? " · this week" : ""}</span>
                  <button onClick={() => setWeekOffset((o) => Math.max(0, o - 1))} disabled={weekOffset === 0} aria-label="Next week" style={{ background: "none", border: "none", cursor: weekOffset === 0 ? "default" : "pointer", padding: 2, color: weekOffset === 0 ? COLORS.line : COLORS.ink, fontSize: 15 }}>›</button>
                </>
              ) : view === "today" ? niceDate() : "Every meal you've logged"}
            </div>
          </div>
          <button onClick={() => { setDraftGoals(goals); setDraftKey(apiKey); setShowSettings(true); }} aria-label="Settings"
            style={{ background: COLORS.card, border: `1px solid ${COLORS.line}`, borderRadius: 999, width: 40, height: 40, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
            <span style={{ fontSize: 17 }}>⚙️</span>
          </button>
        </div>

        {!apiKey && (
          <div style={{ marginTop: 16, background: COLORS.mangoSoft, border: `1px solid ${COLORS.mango}`, borderRadius: 12, padding: "12px 14px", fontSize: 13.5, color: COLORS.ink }}>
            Add your Anthropic API key in settings (⚙️) to enable AI photo and voice estimates. Manual entry with your own numbers works without one.
          </div>
        )}

        <div style={{ display: "flex", gap: 4, background: "#E2DDCF", borderRadius: 999, padding: 4, marginTop: 18 }}>
          <button style={segBtn(view === "today")} onClick={() => setView("today")}>Today</button>
          <button style={segBtn(view === "week")} onClick={() => { setWeekOffset(0); setView("week"); }}>Week</button>
          <button style={segBtn(view === "history")} onClick={() => setView("history")}>History</button>
        </div>

        {view === "today" && (
          <>
            <div style={{ background: COLORS.card, borderRadius: 20, border: `1px solid ${COLORS.line}`, marginTop: 20, padding: "24px 16px", display: "flex", justifyContent: "space-around" }}>
              <PlateRing value={totals.calories} goal={goals.calories} label="Calories" color={COLORS.avocado} softColor={COLORS.avocadoSoft} unit="" />
              <PlateRing value={totals.protein} goal={goals.protein} label="Protein" color={COLORS.mango} softColor={COLORS.mangoSoft} unit="g" />
            </div>

            {error && <div style={{ marginTop: 16, background: COLORS.tomatoSoft, border: `1px solid ${COLORS.tomato}`, color: COLORS.tomato, borderRadius: 12, padding: "10px 14px", fontSize: 14 }}>{error}</div>}

            <div style={{ marginTop: 28 }}>
              <div style={{ fontFamily: "'Fraunces', serif", fontSize: 17, marginBottom: 12 }}>Meals logged</div>
              {meals.length === 0 && (
                <div style={{ color: COLORS.inkSoft, fontSize: 14, background: COLORS.card, border: `1px dashed ${COLORS.line}`, borderRadius: 16, padding: "28px 16px", textAlign: "center" }}>
                  Nothing logged yet. Add a meal photo, or enter one manually, to start tracking today.
                </div>
              )}
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {meals.map((m) => (
                  <MealRow key={m.id} m={m} onEdit={() => openEdit(m, dateKey)} onDelete={() => deleteMealFromDay(dateKey, m.id)} />
                ))}
              </div>
            </div>
          </>
        )}

        {view === "week" && (
          <div style={{ marginTop: 20 }}>
            <div style={{ background: COLORS.card, borderRadius: 20, border: `1px solid ${COLORS.line}`, padding: "18px 14px" }}>
              <div style={{ fontFamily: "'Fraunces', serif", fontSize: 15, marginBottom: 8, color: COLORS.avocado }}>Calories</div>
              <SimpleBarChart data={weekData} dataKey="calories" goal={goals.calories} color={COLORS.avocado} />
            </div>
            <div style={{ background: COLORS.card, borderRadius: 20, border: `1px solid ${COLORS.line}`, padding: "18px 14px", marginTop: 14 }}>
              <div style={{ fontFamily: "'Fraunces', serif", fontSize: 15, marginBottom: 8, color: COLORS.mango }}>Protein</div>
              <SimpleBarChart data={weekData} dataKey="protein" goal={goals.protein} color={COLORS.mango} />
            </div>
            <div style={{ marginTop: 20, display: "flex", flexDirection: "column", gap: 8 }}>
              {weekData.map((d) => (
                <div key={d.date} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: d.isToday ? COLORS.avocadoSoft : COLORS.card, border: `1px solid ${d.isToday ? COLORS.avocado : COLORS.line}`, borderRadius: 12, padding: "10px 14px" }}>
                  <span style={{ fontSize: 13.5, fontWeight: d.isToday ? 600 : 500 }}>{d.full}{d.isToday ? " · today" : ""}</span>
                  {d.count > 0 ? (
                    <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5 }}>
                      <span style={{ color: COLORS.avocado, fontWeight: 600 }}>{d.calories}</span> cal · <span style={{ color: COLORS.mango, fontWeight: 600 }}>{d.protein}g</span>
                    </span>
                  ) : <span style={{ fontSize: 12.5, color: COLORS.inkSoft }}>No meals logged</span>}
                </div>
              ))}
            </div>
          </div>
        )}

        {view === "history" && (
          <div style={{ marginTop: 20 }}>
            {error && <div style={{ marginBottom: 16, background: COLORS.tomatoSoft, border: `1px solid ${COLORS.tomato}`, color: COLORS.tomato, borderRadius: 12, padding: "10px 14px", fontSize: 14 }}>{error}</div>}
            {historyDays.length === 0 && (
              <div style={{ color: COLORS.inkSoft, fontSize: 14, background: COLORS.card, border: `1px dashed ${COLORS.line}`, borderRadius: 16, padding: "28px 16px", textAlign: "center" }}>
                No meals logged yet. Everything you save will build up here, photo and all.
              </div>
            )}
            <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
              {historyDays.map((day) => {
                const dTotals = day.meals.reduce((acc, m) => ({ calories: acc.calories + m.calories, protein: acc.protein + m.protein }), { calories: 0, protein: 0 });
                const d = new Date(day.date + "T00:00:00");
                return (
                  <div key={day.date}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
                      <span style={{ fontFamily: "'Fraunces', serif", fontSize: 16, fontWeight: 600 }}>
                        {day.date === dateKey ? "Today" : d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" })}
                      </span>
                      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: COLORS.inkSoft }}>
                        {Math.round(dTotals.calories)} cal · {Math.round(dTotals.protein)}g protein
                      </span>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                      {day.meals.map((m) => (
                        <MealRow key={m.id} m={m} onEdit={() => openEdit(m, day.date)} onDelete={() => deleteMealFromDay(day.date, m.id)} />
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {view === "today" && (
        <div style={{ position: "fixed", bottom: 24, left: 0, right: 0, display: "flex", justifyContent: "center" }}>
          <button onClick={openAdd} style={{ display: "flex", alignItems: "center", gap: 8, background: COLORS.avocado, color: "#fff", border: "none", borderRadius: 999, padding: "14px 26px", fontSize: 15, fontWeight: 600, cursor: "pointer", boxShadow: "0 8px 24px rgba(63,90,62,0.35)" }}>
            <span style={{ fontSize: 16 }}>➕</span> Add meal
          </button>
        </div>
      )}

      {showSettings && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(43,40,35,0.45)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 10 }}>
          <div style={{ background: COLORS.card, borderRadius: 20, padding: 24, width: "100%", maxWidth: 360, maxHeight: "85vh", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              <span style={{ fontFamily: "'Fraunces', serif", fontSize: 19, fontWeight: 600 }}>Settings</span>
              <button onClick={() => setShowSettings(false)} style={{ background: "none", border: "none", cursor: "pointer" }} aria-label="Close"><span style={{ fontSize: 18 }}>✕</span></button>
            </div>

            <div style={{ fontFamily: "'Fraunces', serif", fontSize: 15, marginTop: 10 }}>Daily goals</div>
            <label style={labelStyle}>Calories</label>
            <input type="number" value={draftGoals.calories} onChange={(e) => setDraftGoals({ ...draftGoals, calories: Number(e.target.value) })} style={{ ...inputStyle, fontFamily: "'IBM Plex Mono', monospace" }} />
            <label style={labelStyle}>Protein (g)</label>
            <input type="number" value={draftGoals.protein} onChange={(e) => setDraftGoals({ ...draftGoals, protein: Number(e.target.value) })} style={{ ...inputStyle, fontFamily: "'IBM Plex Mono', monospace" }} />

            <div style={{ fontFamily: "'Fraunces', serif", fontSize: 15, marginTop: 22, borderTop: `1px solid ${COLORS.line}`, paddingTop: 16 }}>Anthropic API key</div>
            <div style={{ fontSize: 12.5, color: COLORS.inkSoft, marginTop: 4 }}>Needed for AI photo and voice estimates. Get one at console.anthropic.com. Stored only on this device.</div>
            <input type="password" value={draftKey} onChange={(e) => setDraftKey(e.target.value)} placeholder="sk-ant-..." style={{ ...inputStyle, marginTop: 10, fontFamily: "'IBM Plex Mono', monospace" }} />

            <button onClick={() => { saveGoals(draftGoals); saveApiKey(draftKey); setShowSettings(false); }} style={{ ...primaryBtn, marginTop: 20 }}>Save settings</button>
          </div>
        </div>
      )}

      {showAdd && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(43,40,35,0.45)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 10 }}>
          <div style={{ background: COLORS.card, borderRadius: 20, padding: 24, width: "100%", maxWidth: 400, maxHeight: "85vh", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <span style={{ fontFamily: "'Fraunces', serif", fontSize: 19, fontWeight: 600 }}>Add a meal</span>
              <button onClick={closeAdd} style={{ background: "none", border: "none", cursor: "pointer" }} aria-label="Close"><span style={{ fontSize: 18 }}>✕</span></button>
            </div>

            <div style={{ display: "flex", gap: 4, background: "#E2DDCF", borderRadius: 999, padding: 4 }}>
              <button style={segBtn(addTab === "photo")} onClick={() => { setAddTab("photo"); setPreview(null); setError(null); }}>Photo</button>
              <button style={segBtn(addTab === "manual")} onClick={() => { setAddTab("manual"); setPreview(null); setError(null); }}>Manual entry</button>
            </div>

            {error && <div style={{ marginTop: 14, background: COLORS.tomatoSoft, border: `1px solid ${COLORS.tomato}`, color: COLORS.tomato, borderRadius: 10, padding: "9px 12px", fontSize: 13 }}>{error}</div>}

            {addTab === "photo" && (
              <div style={{ marginTop: 16 }}>
                {!photoData && (
                  <button onClick={() => modalFileInputRef.current?.click()} style={{ width: "100%", border: `1.5px dashed ${COLORS.line}`, borderRadius: 14, background: "transparent", padding: "30px 16px", display: "flex", flexDirection: "column", alignItems: "center", gap: 8, cursor: "pointer", color: COLORS.inkSoft }}>
                    <span style={{ fontSize: 22 }}>📷</span>
                    <span style={{ fontSize: 14 }}>Choose or take a photo</span>
                  </button>
                )}
                {photoData && !preview && (
                  <>
                    <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                      <img src={photoData.dataUrl} alt="Meal preview" style={{ width: 72, height: 72, borderRadius: 12, objectFit: "cover", border: `1px solid ${COLORS.line}` }} />
                      <button onClick={() => modalFileInputRef.current?.click()} style={{ ...secondaryBtn, width: "auto", padding: "8px 14px", fontSize: 13 }}>Choose different photo</button>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <label style={{ ...labelStyle, marginBottom: 0 }}>Add details for a more accurate estimate (optional)</label>
                      <VoiceButton voice={photoVoice} />
                    </div>
                    <textarea value={notesText} onChange={(e) => setNotesText(e.target.value)} placeholder="e.g. extra 2 tbsp olive oil dressing, no rice, large portion" rows={3} style={{ ...inputStyle, marginTop: 8, resize: "vertical" }} />
                    <button onClick={estimateFromPhoto} disabled={estimating} style={{ ...primaryBtn, marginTop: 16, opacity: estimating ? 0.7 : 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                      {estimating ? "Estimating…" : "Estimate nutrition"}
                    </button>
                  </>
                )}
                <ResultPreview preview={preview} onSave={saveFromPreview} onDiscard={() => setPreview(null)} />
              </div>
            )}

            {addTab === "manual" && (
              <div style={{ marginTop: 16 }}>
                <label style={{ ...labelStyle, marginTop: 0 }}>Meal name (optional)</label>
                <input value={manualName} onChange={(e) => setManualName(e.target.value)} placeholder="e.g. Lunch" style={inputStyle} />

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 14 }}>
                  <label style={{ ...labelStyle, marginTop: 0 }}>Ingredients, one per line</label>
                  <VoiceButton voice={manualVoice} label="Record instead" />
                </div>
                <textarea value={manualIngredients} onChange={(e) => setManualIngredients(e.target.value)} placeholder={"2 eggs\n1 slice whole wheat toast\n1 tsp butter\n\nOr just tap Record and say what you ate."} rows={4} style={{ ...inputStyle, resize: "vertical" }} />

                <label style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 14, fontSize: 13.5, cursor: "pointer" }}>
                  <input type="checkbox" checked={manualOverride} onChange={(e) => { setManualOverride(e.target.checked); setPreview(null); }} />
                  I already know the calories and protein
                </label>
                {manualOverride ? (
                  <>
                    <label style={labelStyle}>Calories</label>
                    <input type="number" value={manualCalories} onChange={(e) => setManualCalories(e.target.value)} style={{ ...inputStyle, fontFamily: "'IBM Plex Mono', monospace" }} />
                    <label style={labelStyle}>Protein (g)</label>
                    <input type="number" value={manualProtein} onChange={(e) => setManualProtein(e.target.value)} style={{ ...inputStyle, fontFamily: "'IBM Plex Mono', monospace" }} />
                    <button onClick={saveManualDirect} style={{ ...primaryBtn, marginTop: 16 }}>Save meal</button>
                  </>
                ) : (
                  <>
                    {!preview && (
                      <button onClick={estimateFromManual} disabled={estimating} style={{ ...primaryBtn, marginTop: 16, opacity: estimating ? 0.7 : 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                        {estimating ? "Estimating…" : "Estimate nutrition"}
                      </button>
                    )}
                    <ResultPreview preview={preview} onSave={saveFromPreview} onDiscard={() => setPreview(null)} />
                  </>
                )}
              </div>
            )}
          </div>
        </div>
      )}
      <input ref={modalFileInputRef} type="file" accept="image/*" onChange={handleModalPhotoSelect} style={{ display: "none" }} />

      {editMeal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(43,40,35,0.45)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 10 }}>
          <div style={{ background: COLORS.card, borderRadius: 20, padding: 24, width: "100%", maxWidth: 400, maxHeight: "85vh", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <span style={{ fontFamily: "'Fraunces', serif", fontSize: 19, fontWeight: 600 }}>{editMeal.name}</span>
              <button onClick={closeEdit} style={{ background: "none", border: "none", cursor: "pointer" }} aria-label="Close"><span style={{ fontSize: 18 }}>✕</span></button>
            </div>
            <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 10 }}>
              <Thumb thumbnail={editMeal.thumbnail} name={editMeal.name} size={48} />
              <div style={{ fontSize: 13, color: COLORS.inkSoft }}>{(editMeal.items || []).join(", ") || "No ingredients listed"}</div>
            </div>
            {error && <div style={{ marginBottom: 10, background: COLORS.tomatoSoft, border: `1px solid ${COLORS.tomato}`, color: COLORS.tomato, borderRadius: 10, padding: "9px 12px", fontSize: 13 }}>{error}</div>}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 6 }}>
              <label style={{ ...labelStyle, marginTop: 0 }}>Add ingredient details to refine the estimate</label>
              <VoiceButton voice={editVoice} />
            </div>
            <textarea value={refineNotes} onChange={(e) => setRefineNotes(e.target.value)} placeholder="e.g. also had 1 tbsp peanut butter, portion was half this size" rows={3} style={{ ...inputStyle, resize: "vertical" }} />
            <button onClick={recalcEdit} disabled={editBusy} style={{ ...primaryBtn, marginTop: 12, opacity: editBusy ? 0.7 : 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
              {editBusy ? "Recalculating…" : "Recalculate with AI"}
            </button>

            <div style={{ borderTop: `1px solid ${COLORS.line}`, marginTop: 20, paddingTop: 16 }}>
              <div style={{ fontSize: 13, color: COLORS.inkSoft, marginBottom: 8 }}>Or enter the numbers yourself</div>
              <div style={{ display: "flex", gap: 10 }}>
                <div style={{ flex: 1 }}>
                  <label style={{ ...labelStyle, marginTop: 0 }}>Calories</label>
                  <input type="number" value={editCalories} onChange={(e) => setEditCalories(e.target.value)} style={{ ...inputStyle, fontFamily: "'IBM Plex Mono', monospace" }} />
                </div>
                <div style={{ flex: 1 }}>
                  <label style={{ ...labelStyle, marginTop: 0 }}>Protein (g)</label>
                  <input type="number" value={editProtein} onChange={(e) => setEditProtein(e.target.value)} style={{ ...inputStyle, fontFamily: "'IBM Plex Mono', monospace" }} />
                </div>
              </div>
              <button onClick={saveEditNumbers} style={{ ...secondaryBtn, marginTop: 12 }}>Save these numbers</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MealTracker />);
</script>
</body>
</html>
